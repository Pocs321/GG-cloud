# S4: Unsigned Image Attack Scenario
# Tests L5 (Binary Authorization) controls

apiVersion: v1
kind: Pod
metadata:
  name: s4-unsigned-image
  namespace: evaluation
spec:
  serviceAccountName: default
  containers:
  - name: attacker
    # ❌ Unsigned image - should be blocked by Binary Authorization (L5)
    image: gcr.io/mlsa-k8s-capstone/malicious-app:unsigned
    command: ["/bin/sleep", "infinity"]
