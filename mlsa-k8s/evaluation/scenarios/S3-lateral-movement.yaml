# S3: Lateral Movement Scenario
# Tests L3 (mTLS) and L4 (NetworkPolicy) controls

apiVersion: v1
kind: Pod
metadata:
  name: s3-lateral-movement
  namespace: staging
spec:
  serviceAccountName: default
  containers:
  - name: attacker
    image: curlimages/curl:latest
    command:
    - /bin/sh
    - -c
    - |
      # Try cross-namespace access to demo-app in production
      # Should be blocked by NetworkPolicy (L4) and mTLS (L3)
      curl -v -k https://demo-app.production.svc.cluster.local \
        --connect-timeout 3 --max-time 5 || echo "Connection denied (expected)"
      sleep infinity
