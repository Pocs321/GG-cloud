# S5: Secrets Exfiltration Scenario
# Tests L2 (RBAC) controls

apiVersion: v1
kind: Pod
metadata:
  name: s5-secrets-exfiltration
  namespace: staging
spec:
  serviceAccountName: default
  containers:
  - name: attacker
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      # Try to read production namespace secrets from staging pod
      # ❌ Should be blocked by RBAC (L2) and cross-namespace NetworkPolicy (L4)
      curl -s -H "Authorization: Bearer $(cat /run/secrets/kubernetes.io/serviceaccount/token)" \
        https://kubernetes.default.svc.cluster.local/api/v1/namespaces/production/secrets \
        -k --fail-with-body || echo "Access denied (expected)"
      sleep infinity
