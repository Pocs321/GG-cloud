# S1: Privileged Pod Attack Scenario
# Tests L2 (Gatekeeper) and L6 (PSA) controls

apiVersion: v1
kind: Pod
metadata:
  name: s1-privileged-pod
  namespace: production
spec:
  serviceAccountName: default
  containers:
  - name: attacker
    image: alpine:latest
    command: ["/bin/sleep", "infinity"]
    securityContext:
      privileged: true  # ❌ Should be blocked by Gatekeeper
