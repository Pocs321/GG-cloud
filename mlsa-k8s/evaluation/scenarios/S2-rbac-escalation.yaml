# S2: RBAC Privilege Escalation Scenario
# Tests L2 (RBAC) controls

apiVersion: v1
kind: Pod
metadata:
  name: s2-rbac-escalation
  namespace: production
spec:
  serviceAccountName: default  # ❌ Should have no permissions per L2
  containers:
  - name: attacker
    image: alpine:latest
    command:
    - /bin/sh
    - -c
    - |
      # Try to read secrets from default namespace
      curl -s -H "Authorization: Bearer $(cat /run/secrets/kubernetes.io/serviceaccount/token)" \
        https://kubernetes.default.svc.cluster.local/api/v1/namespaces/production/secrets \
        -k --fail-with-body || echo "Access denied (expected)"
      sleep infinity
