# L7 - Grafana Helm Values
# Configuration for visualization dashboards

# Deploy with:
# helm install grafana grafana/grafana \
#   --namespace monitoring \
#   -f kubernetes/L7-observability/grafana/helm-values.yaml

adminPassword: "admin"

persistence:
  enabled: true
  size: 5Gi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: true
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /dashboards
