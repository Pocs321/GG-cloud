# L2 Control Plane - Service Accounts
# Create namespace-scoped service accounts with minimal permissions

apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: production
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: mlsa-k8s
  annotations:
    iam.gke.io/gcp-service-account: demo-app-sa@mlsa-k8s-capstone.iam.gserviceaccount.com
automountServiceAccountToken: true
---
# ClusterRole: No access (for restricted service accounts)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: no-access
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules: []
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "edit", "patch", "delete"]
---
# ClusterRole: Deny all (for restricted service accounts)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: no-access
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules: []
---
# Role: Namespace-scoped resource viewer for production
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-viewer
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/logs"]
  verbs: ["get", "list"]
---
# RoleBinding: demo-app service account gets no special access
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-binding
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: no-access
subjects:
- kind: ServiceAccount
  name: demo-app
  namespace: production
---
# ClusterRoleBinding: readonly-viewer for auditors (example)
# Uncomment and adjust for actual auditor accounts
# apiVersion: rbac.authorization.k8s.io/v1
# kind: ClusterRoleBinding
# metadata:
#   name: auditor-readonly
#   labels:
#     app.kubernetes.io/part-of: mlsa-k8s
# roleRef:
#   apiGroup: rbac.authorization.k8s.io
#   kind: ClusterRole
#   name: readonly-viewer
# subjects:
# - kind: User
#   name: auditor@example.com
# - kind: Group
#   name: developers@example.com
---
# Deny default service account in production
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deny-default
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: no-access
subjects:
- kind: ServiceAccount
  name: default
  namespace: production
