# L2 + L3 Control Plane - Service Accounts (merged)
# Kết hợp L2-RBAC và L3-Workload Identity vào một file duy nhất
# tránh xung đột khi kubectl apply

apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: production
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: mlsa-k8s
  annotations:
    # L3 — Workload Identity: bind K8s SA → GCP SA (keyless auth)
    iam.gke.io/gcp-service-account: demo-app-sa@mlsa-k8s-capstone.iam.gserviceaccount.com
automountServiceAccountToken: false  # L4 — pod không tự nhận K8s API token
---
# ClusterRole: networkpolicy-editor (quản lý NetworkPolicy)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: networkpolicy-editor
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
# ClusterRole: no-access (dùng để gán cho SA/default SA cần bị chặn)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: no-access
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules: []
---
# Role: Namespace-scoped resource viewer for production
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-viewer
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/logs"]
  verbs: ["get", "list"]
---
# RoleBinding: demo-app SA không có quyền gì trong cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-binding
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: no-access
subjects:
- kind: ServiceAccount
  name: demo-app
  namespace: production
---
# RoleBinding: chặn default SA trong production namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deny-default
  namespace: production
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: no-access
subjects:
- kind: ServiceAccount
  name: default
  namespace: production
