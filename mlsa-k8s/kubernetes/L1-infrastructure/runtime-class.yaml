# RuntimeClass for gVisor sandboxing (optional enhanced security)

apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
handler: runsc
overhead:
  podFixed:
    memory: "75Mi"
    cpu: "10m"
scheduling:
  nodeSelector:
    workload-type: evaluation
