# Node Hardening DaemonSet for L1 Infrastructure Security
# Applies seccomp profiles and system hardening

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-hardening
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: mlsa-k8s
    security-layer: L1
spec:
  selector:
    matchLabels:
      app: node-hardening
  template:
    metadata:
      labels:
        app: node-hardening
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: node-hardener
        image: busybox:latest
        command: ["/bin/sleep", "infinity"]
        volumeMounts:
        - name: host
          mountPath: /host
        securityContext:
          privileged: true
      volumes:
      - name: host
        hostPath:
          path: /
          type: Directory
      tolerations:
      - effect: NoSchedule
        operator: Exists
