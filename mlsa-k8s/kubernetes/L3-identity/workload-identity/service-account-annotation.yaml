# L3 - Workload Identity: Service Account Annotation
# Binds Kubernetes Service Account to Google Service Account

apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: production
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: mlsa-k8s
  annotations:
    iam.gke.io/gcp-service-account: demo-app-sa@mlsa-k8s-capstone.iam.gserviceaccount.com
