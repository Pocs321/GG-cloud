# Baseline App Deployment
# INTENTIONALLY INSECURE - for comparison with secured demo-app

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-app
  namespace: production
  labels:
    app: baseline-app
    app.kubernetes.io/part-of: mlsa-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baseline-app
  template:
    metadata:
      labels:
        app: baseline-app
    spec:
      # ❌ Uses default SA
      containers:
      - name: app
        image: gcr.io/mlsa-k8s-capstone/demo-app:latest
        
        # ❌ No resource limits
        resources: {}
        
        # ❌ No security context
        securityContext: {}
        
        volumeMounts:
        - name: all
          mountPath: /
      
      # ❌ Allows all volumes
      volumes:
      - name: all
        hostPath:
          path: /
          type: Directory
