# Baseline Insecure Application (for comparison)
# WARNING: This deployment violates security best practices intentionally
# Use only in isolated evaluation environment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline-app
  namespace: staging
  labels:
    app: baseline-app
    purpose: security-comparison
    app.kubernetes.io/part-of: mlsa-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baseline-app
  template:
    metadata:
      labels:
        app: baseline-app
    spec:
      serviceAccountName: default  # Uses default service account
      automountServiceAccountToken: true
      
      # No pod security context!
      containers:
      - name: baseline-app
        image: alpine:latest
        command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
        
        # NO resource limits!
        
        # No container security context - runs as root
        
        # No health checks
        
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
      
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: baseline-app
  namespace: staging
spec:
  type: ClusterIP
  selector:
    app: baseline-app
  ports:
  - port: 80
    targetPort: 8080
